<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff5500"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Scooter / delivery motif — simplified -->
  <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bag / box -->
    <rect x="-70" y="-110" width="140" height="110" rx="16" fill="#fff" fill-opacity=".25" stroke="#fff"/>
    <!-- Bag flap -->
    <line x1="-70" y1="-60" x2="70" y2="-60"/>
    <!-- Arrow-up (speed / delivery) -->
    <polyline points="-25,-130 0,-160 25,-130" stroke-width="20"/>
    <line x1="0" y1="-155" x2="0" y2="-80" stroke-width="16"/>
  </g>
  <!-- Text "DE" -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="90" fill="#fff" letter-spacing="8">DeliEasy</text>
</svg>
